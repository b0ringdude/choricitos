<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>choricictos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Tahoma, Arial, sans-serif;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .dialog {
      position: relative;
      z-index: 10;
      width: 340px;
      border: 2px solid #0055aa;
      box-shadow: 2px 2px 0 #000, inset 1px 1px 0 #fff;
    }

    .titlebar {
      background: linear-gradient(to right, #0a4bd1, #3a9de8);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 4px 3px 6px;
      font-size: 11px;
      font-weight: bold;
      user-select: none;
    }

    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .close-btn {
      background: linear-gradient(to bottom, #f07070, #c03030);
      border: 1px solid #800000;
      color: #fff;
      font-size: 10px;
      font-weight: bold;
      width: 17px;
      height: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .dialog-body {
      background: #ece9d8;
      padding: 16px 20px 14px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .dialog-text {
      font-size: 13px;
      color: #000;
      line-height: 1.5;
      padding-top: 4px;
    }

    .dialog-footer {
      background: #ece9d8;
      border-top: 1px solid #aca899;
      padding: 10px 14px 12px;
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
    }

    .xp-btn {
      background: linear-gradient(to bottom, #f5f4ee, #dbd9cc);
      border: 1px solid #7a7a7a;
      box-shadow: inset 1px 1px 0 #fff;
      font-family: Tahoma, Arial, sans-serif;
      font-size: 11px;
      color: #000;
      padding: 3px 14px;
      min-width: 75px;
      cursor: pointer;
      transition: font-size 0.3s, padding 0.3s, min-width 0.3s;
    }

    #yes-msg {
      display: none;
      position: relative;
      z-index: 10;
      color: #ff88aa;
      font-size: 28px;
      text-align: center;
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <div class="dialog" id="dialogo">
    <div class="titlebar">
      <div class="titlebar-left">ErrorAlex404NotFoundChoricitos</div>
      <div class="close-btn" onclick="growSi()">✕</div>
    </div>
    <div class="dialog-body">
      <div style="font-size:28px; margin-top:2px;">⚠️</div>
      <div class="dialog-text">Alex mi amor, ¿me quieres?</div>
    </div>
    <div class="dialog-footer">
      <button class="xp-btn" id="btn-si" onclick="yesClick()">Sí</button>
      <button class="xp-btn" id="btn-no" onclick="growSi()">No</button>
    </div>
  </div>

  <div id="yes-msg">No es necesario clickear nada para saber que me quieres. 💗</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      drawHearts();
    }

    function drawHeart(x, y, size, color, rot) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.fillStyle = color;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.beginPath();
      const r = size;
      const w = (Math.random() - 0.5) * r * 0.3;
      ctx.moveTo(0, r * 0.1);
      ctx.bezierCurveTo(
        -r + w, -r * 1.3 + w,
        -r * 1.1 + w, w,
        0, r
      );
      ctx.bezierCurveTo(
        r * 1.1 + w, w,
        r + w, -r * 1.3 + w,
        0, r * 0.1
      );
      ctx.fill();
      ctx.restore();
    }

    function drawHearts() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const colors = ['#cc2244','#e05577','#ff3366','#aa1133','#ff6699','#dd3355'];
      for (let i = 0; i < 40; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const size = 14 + Math.random() * 40;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const rot = (Math.random() - 0.5) * 0.7;
        ctx.globalAlpha = 0.4 + Math.random() * 0.4;
        drawHeart(x, y, size, color, rot);
      }
      ctx.globalAlpha = 1;
    }

    let noCount = 0;
    function growSi() {
      noCount++;
      const btn = document.getElementById('btn-si');
      btn.style.fontSize = (11 + noCount * 5) + 'px';
      btn.style.padding = (3 + noCount * 3) + 'px ' + (14 + noCount * 6) + 'px';
      btn.style.minWidth = (75 + noCount * 22) + 'px';
    }

    function yesClick() {
      document.getElementById('dialogo').style.display = 'none';
      document.getElementById('yes-msg').style.display = 'block';
    }

    window.addEventListener('resize', resize);
    resize();
  </script>

</body>
</html>
